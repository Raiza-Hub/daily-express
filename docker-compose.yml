version: "3.8"
services:
  db:
    image: postgres:latest
    container_name: daily_express
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ateazy
    volumes:
      - ./init-database.sql:/docker-entrypoint-initdb.d/init-database.sql
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: daily_express_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pgdata:
  redis_data:
