services:
  db:
    image: postgres:latest
    container_name: daily_express
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ateazy
    volumes:
      - ./init-dailyexpress-api-database.sh:/docker-entrypoint-initdb.d/init-dailyexpress-api-database.sh
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 10s
      retries: 10

  dailyexpress-api:
    image: daily-express-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/dailyexpress-api
    env_file:
      - ./dailyexpress-api/.env
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgres://olaoluwa:ateazy@db:5432/dailyexpress_api
      FRONTEND_URL: http://localhost:3000
      DRIVER_APP_URL: http://localhost:3001
      PAYMENT_PUBLIC_BASE_URL: http://localhost:8000/api/v1/payments
      KORA_WEBHOOK_URL: http://localhost:8000/api/v1/payments/webhooks/kora
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8080,http://localhost:3002
    command: ["bun", "/app/dailyexpress-api/index.ts"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const res = await fetch('http://localhost:8000/health'); if (!res.ok) throw new Error('status ' + res.status);",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
