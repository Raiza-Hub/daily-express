name: daily-express

services:
  db:
    image: postgres:latest
    container_name: dailyexpress-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAILYEXPRESS_API_DB_PASSWORD: ${DAILYEXPRESS_API_DB_PASSWORD}
      DAILYEXPRESS_READONLY_DB_PASSWORD: ${DAILYEXPRESS_READONLY_DB_PASSWORD}
      METABASE_APP_DB_PASSWORD: ${METABASE_APP_DB_PASSWORD}
    volumes:
      - ./init-dailyexpress-api-database.sh:/docker-entrypoint-initdb.d/init-dailyexpress-api-database.sh
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 10s
      retries: 10

  dailyexpress-api:
    container_name: dailyexpress-api
    image: daily-express-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/dailyexpress-api
    env_file:
      - ./dailyexpress-api/.env
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: ${DAILYEXPRESS_API_DATABASE_URL}
      FRONTEND_URL: http://localhost:3000
      DRIVER_APP_URL: http://localhost:3001
      PAYMENT_PUBLIC_BASE_URL: http://localhost:8000/api/v1/payments
      KORA_WEBHOOK_URL: http://localhost:8000/api/v1/payments/webhooks/kora
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8080,http://localhost:3002
    command: ["bun", "/app/dailyexpress-api/index.ts"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const res = await fetch('http://localhost:8000/health'); if (!res.ok) throw new Error('status ' + res.status);",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  metabase:
    container_name: dailyexpress-metabase
    image: metabase/metabase:latest
    ports:
      - "3002:3000"
    environment:
      MB_SITE_NAME: ${MB_SITE_NAME:-Daily Express Metabase}
      MB_ANON_TRACKING_ENABLED: "false"
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_APP_DB_NAME:-dailyexpress_metabase}
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_APP_DB_USER:-metabase_app}
      MB_DB_PASS: ${METABASE_APP_DB_PASSWORD}
      MB_DB_HOST: db
      MB_UNAGGREGATED_QUERY_ROW_LIMIT: ${MB_UNAGGREGATED_QUERY_ROW_LIMIT:-2000}
      MB_AGGREGATED_QUERY_ROW_LIMIT: ${MB_AGGREGATED_QUERY_ROW_LIMIT:-10000}
      MB_DB_QUERY_TIMEOUT_MINUTES: ${MB_DB_QUERY_TIMEOUT_MINUTES:-2}
    depends_on:
      dailyexpress-api:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -I http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  pgdata:
